server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: personality-radar
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/personality_radar?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:radar}
    password: ${DB_PASSWORD:radar123}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  jwt:
    secret: ${JWT_SECRET:local-development-only-personality-radar-secret-2026}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}
  ai:
    deepseek:
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      model: ${AI_MODEL:deepseek-chat}
      timeout-seconds: ${AI_TIMEOUT_SECONDS:8}
      cache-ttl-hours: ${AI_CACHE_TTL_HOURS:24}

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

ai:
  amap:
    key: ${AMAP_API_KEY:}

  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
