services:
  mysql:
    image: mysql:8.0
    container_name: radar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: personality_radar
      MYSQL_USER: ${MYSQL_USER:-radar}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-radar123}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uradar", "-pradar123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: radar-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-radar-redis-dev}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-radar-redis-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: radar-backend-runtime:latest
    container_name: radar-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/personality_radar?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME:-radar}
      DB_PASSWORD: ${DB_PASSWORD:-radar123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-radar-redis-dev}
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-change-in-production}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://app.reflectstars.dev,https://reflectstars.dev,http://127.0.0.1:5173,http://localhost:5173}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://app.reflectstars.dev}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
    ports:
      - "8080:8080"
