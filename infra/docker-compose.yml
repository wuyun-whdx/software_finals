services:
  mysql:
    image: mysql:8.0
    container_name: radar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: personality_radar
      MYSQL_USER: radar
      MYSQL_PASSWORD: radar123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uradar", "-pradar123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: radar-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: radar-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/personality_radar?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      DB_USERNAME: radar
      DB_PASSWORD: radar123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: radar-demo-secret-key-change-me-32bytes
      CORS_ALLOWED_ORIGINS: https://app.reflectstars.dev,https://reflectstars.dev,http://127.0.0.1:5173,http://localhost:5173
      PUBLIC_BASE_URL: https://app.reflectstars.dev
    ports: 
      - "8080:8080"
